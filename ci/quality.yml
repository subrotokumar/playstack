quality:sonarqube:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    - key: sonar-${CI_JOB_NAME}
      paths:
        - .sonar/cache
  script:
    - sonar-scanner
  artifacts:
    paths:
      - .scannerwork/report-task.txt
    expire_in: 1 hour
  needs:
    - test:unit
  allow_failure: true
  rules:
    - if: '$SONAR_TOKEN == null'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'