.argocd_sync:
  extends: .argocd_login
  stage: sync
  script:
    - |
      for app in backend-${ENVIRONMENT} transcoder-${ENVIRONMENT}; do
        argocd app sync ${app} --prune --force
        argocd app wait ${app} --timeout ${SYNC_TIMEOUT} --health

        HEALTH=$(argocd app get ${app} -o json | jq -r '.status.health.status')
        if [ "$HEALTH" != "Healthy" ]; then
          echo "${app} is not healthy: ${HEALTH}"
          exit 1
        fi
      done
      echo "${ENVIRONMENT} deployment completed"

sync:argocd:dev:
  extends: .argocd_sync
  needs:
    - update:manifests:dev
  variables:
    ENVIRONMENT: dev
    SYNC_TIMEOUT: "300"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: on_success

sync:argocd:staging:
  extends: .argocd_sync
  needs:
    - update:manifests:staging
  variables:
    ENVIRONMENT: staging
    SYNC_TIMEOUT: "600"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success

sync:argocd:production:
  extends: .argocd_sync
  needs:
    - update:manifests:production
  variables:
    ENVIRONMENT: production
    SYNC_TIMEOUT: "900"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      when: manual

# ---- Rollback ----

rollback:production:
  extends: .argocd_login
  stage: sync
  script:
    - |
      for app in backend-production transcoder-production; do
        argocd app rollback ${app} --prune
        argocd app wait ${app} --timeout 600 --health
      done
      echo "Rollback completed"
  when: manual
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'

# ---- Utility ----

argocd:app:status:
  extends: .argocd_login
  stage: sync
  script:
    - |
      for env in dev staging production; do
        echo "=== ${env} ==="
        argocd app get backend-${env}
        argocd app get transcoder-${env}
      done
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'