.update_manifests:
  extends: .gitops_setup
  stage: update-manifests
  needs:
    - container_scanning:backend
    - container_scanning:transcoder
  script:
    - |
      git clone ${GITOPS_REPO} gitops
      cd gitops
      git checkout ${GITOPS_BRANCH}

      IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG=${CI_COMMIT_TAG}
      fi
         
      yq eval ".appVersion = \"${IMAGE_TAG}\"" \
        -i ${VALUES_FILE}

      git add -A
      if git diff --staged --quiet; then
        echo "No changes to commit"
      else
        git commit -m "chore(${ENVIRONMENT}): update appVersion to ${IMAGE_TAG}

      Source: ${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA}
      Pipeline: ${CI_PIPELINE_URL}"
        git push origin ${GITOPS_BRANCH}
      fi

update:manifests:dev:
  extends: .update_manifests
  variables:
    ENVIRONMENT: dev
    VALUES_FILE: helm/values.dev.yaml
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

update:manifests:staging:
  extends: .update_manifests
  variables:
    ENVIRONMENT: stage
    VALUES_FILE: helm/values.stage.yaml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "dev" &&
           $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: on_success
    - when: never

update:manifests:production:
  extends: .update_manifests
  variables:
    ENVIRONMENT: prod
    VALUES_FILE: helm/values.prod.yaml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "dev" &&
           $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: manual
    - when: never