# Reusable templates.
# All jobs in ci/ reference these via extends:

.go_template:
  image: golang:${GO_VERSION}
  before_script:
    - mkdir -p .cache/go-build
    - export GOCACHE=$CI_PROJECT_DIR/.cache/go-build
    - go mod download
  cache:
    - key: go-modules-$CI_COMMIT_REF_SLUG-${CI_JOB_NAME}
      paths:
        - .cache/go-build/
      when: always

.build_ecr_login:
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://sts.amazonaws.com
  before_script:
    - apk add --no-cache aws-cli
    - export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
    - STS_OUTPUT=$(aws sts assume-role-with-web-identity --region "$AWS_DEFAULT_REGION" --role-arn "${AWS_ROLE_ARN}" --role-session-name gitlab-ci-${CI_JOB_ID} --web-identity-token "${GITLAB_OIDC_TOKEN}" --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" --output text)
    - export AWS_ACCESS_KEY_ID=$(echo $STS_OUTPUT | awk '{print $1}')
    - export AWS_SECRET_ACCESS_KEY=$(echo $STS_OUTPUT | awk '{print $2}')
    - export AWS_SESSION_TOKEN=$(echo $STS_OUTPUT | awk '{print $3}')
    - unset STS_OUTPUT
    - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin ${IMAGE_REGISTRY}

.gitops_setup:
  image: alpine:latest
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    - git config --global user.name "${GITLAB_USER_NAME}"
    - git config --global url."https://oauth2:${GITOPS_ACCESS_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"

# ---- Shared rule sets ----

.rules_mr_and_default:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.rules_deployable_branches:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_TAG'

.rules_semver_tag:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'